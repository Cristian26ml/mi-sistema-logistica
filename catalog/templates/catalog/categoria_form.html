{% extends "base.html" %}
{% block title %}Nueva categoría{% endblock %}

{% block content %}
<div class="container py-4">

    <h3 class="mb-4">Nueva categoría</h3>

    {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
    {% endif %}

    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5">

            <div class="card bg-secondary text-light shadow border-0">
                <div class="card-body">

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label"><strong>Nombre</strong></label>
                            {{ form.nombre }}
                        </div>

                        <div class="d-flex gap-2">
                            <button class="btn btn-dark text-start mb-3" type="submit">
                                Guardar categoría
                            </button>

                            <a href="{% url 'catalog:productos_list' %}" class="btn btn-dark text-start mb-3">
                                Cancelar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>
{% endblock %}
