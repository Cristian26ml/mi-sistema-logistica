{% extends "base.html" %}
{% block title %}Ubicaciones{% endblock %}

{% block content %}
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="mb-0">Ubicaciones</h3>

        <a class="btn btn-secondary" href="{% url 'warehouse:ubicacion_generar' %}">
            + Nueva ubicación
        </a>
    </div>

    <div class="card bg-secondary text-light shadow border-0">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table tabla-personalizada table-hover align-middle mb-0">

                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Descripción</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for u in ubicaciones %}
                        <tr>
                            <td>{{ u.codigo }}</td>
                            <td>{{ u.descripcion }}</td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="2" class="text-center text-light py-3">
                                No hay ubicaciones registradas.
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>
{% endblock %}
