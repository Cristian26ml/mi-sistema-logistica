{% extends "base.html" %}
{% block title %}Nueva asignación{% endblock %}

{% block content %}
<div class="container py-4">

    <h3 class="mb-4">Nueva asignación</h3>

    {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
    {% endif %}

    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">

            <div class="card bg-secondary text-light shadow border-0">
                <div class="card-body">

                    <form method="post">
                        {% csrf_token %}

                        <div class="row g-3">
                            <div class="col-12">
                                <label for="{{ form.producto.id_for_label }}" class="form-label">Producto</label>
                                {{ form.producto }}
                            </div>

                            <div class="col-12">
                                <label for="{{ form.ubicacion.id_for_label }}" class="form-label">Ubicación</label>
                                {{ form.ubicacion }}
                            </div>
                        </div>

                        <div class="mt-4 d-flex gap-2 flex-wrap">
                            <button class="btn btn-dark text-start mb-3" type="submit">Guardar</button>
                            <a class="btn btn-dark text-start mb-3" href="{% url 'warehouse:asignaciones_list' %}">
                                Volver
                            </a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

</div>
{% endblock %}
