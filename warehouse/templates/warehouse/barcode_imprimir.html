{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Imprimir código de barras</title>
    <link rel="stylesheet" href="{% static '/css/main.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow-lg p-4 text-center bg-dark" style="max-width: 400px; border: none;">
            
            <h2 class="h5 text-light mb-4">Código de barras generado</h2>
            
            <div class="bg-white p-3 rounded mb-3">
                <img src="data:image/png;base64,{{ imagen_base64 }}" class="img-fluid" alt="Código de barras">
            </div>
            
            <p class="h4 text-light fw-bold mb-4">{{ codigo }}</p>
            
            <button onclick="window.print()" class="btn btn-dark text-start mb-3">
                Imprimir etiqueta
            </button>
            
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
