{% extends "base.html" %}
{% block title %}Ubicaciones{% endblock %}

{% block content %}
    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <h3>Ubicaciones</h3>
        <a class="btn" style="text-decoration:none; padding:10px 12px; display:inline-block;"
            href="{% url 'warehouse:ubicacion_generar' %}">+ Nueva ubicación</a>
    </div>

    <table style="width:100%; border-collapse:collapse;">
        <thead>
            <tr>
                <th style="text-align:left; padding:8px; border-bottom:1px solid #ddd;">Código</th>
                <th style="text-align:left; padding:8px; border-bottom:1px solid #ddd;">Descripción</th>
            </tr>
        </thead>
        <tbody>
            {% for u in ubicaciones %}
                <tr>
                    <td style="padding:8px; border-bottom:1px solid #eee;">{{ u.codigo }}</td>
                    <td style="padding:8px; border-bottom:1px solid #eee;">{{ u.descripcion }}</td>
                </tr>
            {% empty %}
                <tr><td colspan="2" style="padding:10px;">No hay ubicaciones registradas.</td></tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
