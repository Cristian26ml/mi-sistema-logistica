{% extends "base.html" %}
{% block title %}Registrar movimiento{% endblock %}

{% block content %}
<div class="container py-4">

    <h3 class="mb-4">Registrar movimiento</h3>

    <div class="mb-3">
        <span class="badge bg-warning text-dark">
            Stock bajo: {{ bajo_stock }}
        </span>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert 
                {% if message.tags == 'success' %}alert-success
                {% elif message.tags == 'error' %}alert-danger
                {% elif message.tags == 'warning' %}alert-warning
                {% else %}alert-info
                {% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="row justify-content-center">
        <div class="col-12 col-lg-8">

            <div class="card bg-secondary text-light shadow border-0">
                <div class="card-body">

                    <form method="post">
                        {% csrf_token %}

                        <div class="row g-3">

                            <!-- Producto -->
                            <div class="col-md-6">
                                <label class="form-label"><strong>Producto</strong></label>
                                <select name="producto_id" id="producto_id" class="form-select" required>
                                    {% for p in productos %}
                                        <option value="{{ p.id }}">
                                            {{ p.sku }} - {{ p.nombre }} (stock: {{ p.stock_actual }})
                                        </option>
                                    {% endfor %}
                                </select>

                                <small class="d-block mt-2 text-light">
                                    <strong>Ubicación sugerida:</strong>
                                    <span id="ubicacion_text">-</span>
                                </small>
                            </div>

                            <!-- Ubicación -->
                            <div class="col-md-6">
                                <label class="form-label"><strong>Ubicación</strong></label>
                                <select name="ubicacion_id" id="ubicacion_id" class="form-select" required>
                                    {% for u in ubicaciones %}
                                        <option value="{{ u.id }}">
                                            {{ u.codigo }} - {{ u.descripcion }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- Tipo -->
                            <div class="col-md-6">
                                <label class="form-label"><strong>Tipo</strong></label>
                                <select name="tipo" class="form-select" required>
                                    {% for value, label in form.fields.tipo.choices %}
                                        <option value="{{ value }}">{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- Cantidad -->
                            <div class="col-md-6">
                                <label class="form-label"><strong>Cantidad</strong></label>
                                <input type="number" name="cantidad" min="1" required class="form-control">
                            </div>

                        </div>

                        <div class="mt-4 d-flex gap-2">
                            <button class="btn" type="submit">
                                Guardar movimiento
                            </button>

                            <a href="{% url 'inventory:dashboard' %}" class="btn">
                                Cancelar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

<script>
    const ubicaciones = {{ ubicaciones_por_producto|safe }};
    const selectProducto = document.getElementById("producto_id");
    const ubicacionText = document.getElementById("ubicacion_text");

    function actualizarUbicacion() {
        const pid = selectProducto.value;
        const u = ubicaciones[pid];
        ubicacionText.textContent = (u && u.length) ? u.join(", ") : "Sin ubicación asignada";
    }

    selectProducto.addEventListener("change", actualizarUbicacion);
    actualizarUbicacion();
</script>

{% endblock %}
